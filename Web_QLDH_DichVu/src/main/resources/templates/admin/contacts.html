<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hòm Thư Khách Hàng - SMM Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .admin-card { border-radius: 15px; border: none; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-warning" href="/admin/dashboard">
            <i class="bi bi-shield-lock-fill me-2"></i>ADMIN DASHBOARD
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link admin-nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-1"></i>Tổng Quan</a></li>
                <li class="nav-item"><a class="nav-link admin-nav-link" href="/admin/services"><i class="bi bi-grid me-1"></i>Quản Lý Dịch Vụ</a></li>
                <li class="nav-item"><a class="nav-link admin-nav-link" href="/admin/orders"><i class="bi bi-cart-check me-1"></i>Quản Lý Đơn Hàng</a></li>
                <li class="nav-item"><a class="nav-link admin-nav-link" href="/admin/recharge"><i class="bi bi-cash-coin me-1"></i>Duyệt Nạp Tiền</a></li>
                <li class="nav-item"><a class="nav-link admin-nav-link" href="/admin/users"><i class="bi bi-people me-1"></i>Quản Lý Thành Viên</a></li>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/contacts"><i class="bi bi-envelope-paper me-1"></i>Liên Hệ Khách Hàng</a>
                </li>
            </ul>
            <div class="d-flex align-items-center text-white border-start border-secondary ps-3 ms-3">
                <i class="bi bi-person-circle fs-4 text-info me-2"></i>
                <span class="me-3">Chào, <b class="text-warning" th:text="${username != null ? username : 'Admin'}">Admin</b></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-danger fw-bold shadow-sm"><i class="bi bi-power me-1"></i>Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 pb-5">
    <h3 class="fw-bold mb-4 text-dark"><i class="bi bi-envelope-paper me-2"></i>Hòm Thư Khách Hàng</h3>

    <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm fw-bold" th:text="${successMessage}"></div>

    <div class="card shadow-sm admin-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Thời gian</th>
                        <th>Khách hàng</th>
                        <th>Thông tin liên hệ</th>
                        <th style="width: 40%;">Nội dung tin nhắn</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(messages)}">
                        <td colspan="6" class="text-center py-5 text-muted">Chưa có tin nhắn nào.</td>
                    </tr>

                    <tr th:each="msg : ${messages}" th:classappend="${!msg.isProcessed()} ? 'table-warning' : ''">
                        <td class="ps-4 text-muted small" th:text="${#temporals.format(msg.createdAt, 'HH:mm - dd/MM/yyyy')}"></td>
                        <td class="fw-bold text-dark">
                            <span th:text="${msg.name}"></span><br>
                            <span th:if="${msg.user != null}" class="badge bg-secondary" th:text="'@' + ${msg.user.username}"></span>
                        </td>
                        <td>
                            <div class="small"><i class="bi bi-envelope text-danger me-1"></i><span th:text="${msg.email}"></span></div>
                            <div class="small"><i class="bi bi-telephone text-success me-1"></i><span th:text="${msg.phone}"></span></div>
                        </td>
                        <td>
                            <p class="mb-0 text-break" style="white-space: pre-wrap;" th:text="${msg.message}"></p>
                        </td>
                        <td>
                            <span th:if="${!msg.isProcessed()}" class="badge bg-warning text-dark rounded-pill">Chờ Xử Lý</span>
                            <span th:if="${msg.isProcessed()}" class="badge bg-success rounded-pill">Đã Tiếp Nhận</span>
                        </td>
                        <td class="text-end pe-4 text-nowrap">

                            <form th:if="${!msg.isProcessed()}" th:action="@{/admin/contacts/process/{id}(id=${msg.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-success shadow-sm" title="Tiếp nhận & Bắn chuông">
                                    <i class="bi bi-check-circle-fill me-1"></i> Tiếp nhận
                                </button>
                            </form>

                            <form th:action="@{/admin/contacts/delete/{id}(id=${msg.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Chắc chắn muốn xóa tin nhắn này?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger shadow-sm ms-1" title="Xóa">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>

                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var currentPath = window.location.pathname;
        var navLinks = document.querySelectorAll('.admin-nav-link');
        navLinks.forEach(function(link) {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active', 'fw-bold', 'text-white');
            }
        });
    });
</script>
</body>
</html>
