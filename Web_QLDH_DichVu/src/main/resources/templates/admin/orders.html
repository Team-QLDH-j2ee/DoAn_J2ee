<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Quản Lý Đơn Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .card-custom { border-radius: 15px; border: none; }
        .table-custom th { background-color: #f8f9fa; font-weight: 600; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold text-warning" href="/admin/dashboard">
            <i class="bi bi-shield-lock-fill me-2"></i>ADMIN DASHBOARD
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-1"></i>Tổng Quan</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/services"><i class="bi bi-grid me-1"></i>Quản Lý Dịch Vụ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/orders"><i class="bi bi-cart-check me-1"></i>Quản Lý Đơn Hàng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/recharge"><i class="bi bi-cash-coin me-1"></i>Duyệt Nạp Tiền</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link admin-nav-link" href="/admin/users"><i class="bi bi-people me-1"></i>Quản Lý Thành Viên</a>
                </li>
            </ul>
            <div class="d-flex align-items-center text-white border-start border-secondary ps-3 ms-3">
                <i class="bi bi-person-circle fs-4 text-info me-2"></i>
                <span class="me-3">Chào Chủ Tịch, <b class="text-warning">Sơn Đại Ka</b></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-danger fw-bold shadow-sm">
                        <i class="bi bi-power me-1"></i>Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var currentPath = window.location.pathname;
        var navLinks = document.querySelectorAll('.admin-nav-link');
        navLinks.forEach(function(link) {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active', 'fw-bold', 'text-white');
            }
        });
    });
</script>

<div class="container-fluid px-4 pb-5">
    <div class="card shadow-sm card-custom">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center" style="border-radius: 15px 15px 0 0; border-bottom: 2px solid #f8f9fa;">
            <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-cart-check text-primary me-2"></i>Toàn Bộ Đơn Hàng Hệ Thống</h5>
        </div>

        <div class="card-body p-0">
            <div class="p-3">
                <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 table-custom">
                    <thead>
                    <tr>
                        <th class="ps-4">Mã Đơn</th>
                        <th>Khách Hàng</th>
                        <th>Link Tương Tác</th>
                        <th>Bắt đầu</th>
                        <th>Cần tăng</th>
                        <th>Tổng Tiền</th>
                        <th>Cập Nhật Trạng Thái</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                            Chưa có đơn hàng nào trong hệ thống.
                        </td>
                    </tr>
                    <tr th:each="order : ${orders}">
                        <td class="ps-4 fw-bold text-muted" th:text="'#' + ${order.id}"></td>

                        <td><span class="badge bg-secondary" th:text="${order.user.username}"></span></td>

                        <td>
                            <a th:href="${order.targetLink}" target="_blank" class="text-truncate d-inline-block text-decoration-none" style="max-width: 150px;" th:text="${order.targetLink}"></a>
                        </td>

                        <td th:text="${order.initialCount}"></td>
                        <td class="fw-bold" th:text="${order.quantity}"></td>
                        <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(order.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                        <td class="pe-4" style="min-width: 250px;">
                            <form th:action="@{/admin/orders/update-status/{id}(id=${order.id})}" method="post" class="d-flex align-items-center gap-2">
                                <select name="status" class="form-select form-select-sm fw-bold"
                                        th:classappend="${order.status.name() == 'COMPLETED' ? 'border-success text-success' : (order.status.name() == 'PENDING' ? 'border-warning text-warning' : '')}">
                                    <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">Chờ Thanh Toán</option>
                                    <option value="IN_PROGRESS" th:selected="${order.status.name() == 'IN_PROGRESS'}">Đang Chạy</option>
                                    <option value="COMPLETED" th:selected="${order.status.name() == 'COMPLETED'}">Hoàn Thành</option>
                                    <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">Đã Hủy</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary text-nowrap">
                                    <i class="bi bi-check2-circle"></i> Lưu
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
