<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <style th:fragment="nav-styles">
        @keyframes swing {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-10deg); }
            60% { transform: rotate(5deg); }
            80% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

<nav th:fragment="customer-nav" class="navbar navbar-expand-lg bg-white sticky-top py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <span class="text-dark fw-bold"><i class="bi bi-rocket-takeoff-fill text-primary me-2"></i>SMM Panel</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link active fw-bold" href="/"><i class="bi bi-house-door me-1"></i>Trang Chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="/#services"><i class="bi bi-grid me-1"></i>Dịch Vụ</a></li>
                <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-tags me-1"></i>Giá Cả</a></li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/recharge}">
                        Nạp tiền
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contact}">
                        <i class="bi bi-headset me-1"></i>Liên Hệ
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <div th:if="${unreadNotifCount == null && username == null}">
                    <a th:href="@{/login}" class="btn btn-outline-primary me-2"><i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập</a>
                    <a th:href="@{/register}" class="btn btn-primary"><i class="bi bi-person-plus me-1"></i>Đăng ký</a>
                </div>

                <div th:if="${username != null}" class="d-flex align-items-center gap-3">
                    <a th:href="@{/order/history}" class="btn btn-outline-primary btn-sm rounded-pill px-3"><i class="bi bi-speedometer2 me-1"></i>Lịch sử</a>

                    <div class="me-2">
                        <a th:href="@{/user/notifications}" class="text-decoration-none position-relative" title="Thông báo">
                            <i class="bi bi-bell-fill text-warning" style="font-size: 1.6rem; animation: swing 2s infinite ease-in-out alternate;"></i>
                            <span th:if="${unreadNotifCount > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light" style="font-size: 0.65rem;" th:text="${unreadNotifCount}">0</span>
                        </a>
                    </div>

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle text-primary" style="font-size: 1.8rem;"></i>

                            <div class="ms-2 d-flex flex-column">
                                <span class="fw-bold text-dark" th:text="${username}">User</span>

                                <!-- BALANCE -->
                                <small style="color: #28a745; font-weight: 600;">
                                    Số dư:
                                    <span th:text="${#numbers.formatDecimal(balance, 0, 'COMMA', 0, 'POINT')}">0</span>
                                    VND
                                </small>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3" style="border-radius: 12px; min-width: 220px;">
                            <li><div class="dropdown-header fw-bold text-dark" th:text="${username}">User</div></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item py-2" th:href="@{/order/create}"><i class="bi bi-cart-plus me-2 text-info"></i> Đặt đơn mới</a></li>
                            <li><a class="dropdown-item py-2" th:href="@{/order/history}"><i class="bi bi-clock-history me-2 text-warning"></i> Lịch sử đơn</a></li>
                            <li><a class="dropdown-item py-2" th:href="@{/user/recharge}"><i class="bi bi-wallet2 me-2 text-success"></i> Nạp tiền</a></li>

                            <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"></li>
                            <li sec:authorize="hasRole('ADMIN')">
                                <a class="dropdown-item py-2 bg-light text-danger fw-bold" th:href="@{/admin/dashboard}">
                                    <i class="bi bi-shield-lock-fill me-2"></i> Trang Quản Trị
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item py-2 text-secondary fw-bold border-0 bg-transparent w-100 text-start">
                                        <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
