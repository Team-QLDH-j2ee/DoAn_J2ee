<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quên mật khẩu - SMM Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{fragments/navbar :: nav-styles}"></th:block>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: customer-nav}"></nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Quên Mật Khẩu</h4>
        </div>
        <div class="card-body p-4">

          <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
          <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

          <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
              <label class="form-label fw-bold">Email đăng ký</label>
              <input type="email" name="email" class="form-control" required placeholder="Nhập email của bạn...">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">GỬI YÊU CẦU</button>
          </form>

          <div class="text-center mt-3">
            <p class="mb-0">Trở lại <a th:href="@{/login}" class="text-decoration-none">Đăng nhập</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            © COPYRIGHT SMM PANEL - ALL RIGHTS RESERVED.
        </div>
        <div class="d-flex align-items-center">
            <span class="status-dot"></span>
            <span class="me-3 fw-bold" style="color: var(--brand-secondary)">STATE</span>
            <i class="bi bi-globe me-2 fs-5"></i>
            <i class="bi bi-question-circle fs-5"></i>
        </div>
    </div>
</footer>

</body>
</html>
