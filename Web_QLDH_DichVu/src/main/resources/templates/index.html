<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SMM Panel - J2EE Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="text-center bg-white p-5 rounded shadow">
    <h1 class="text-primary fw-bold mb-3">Hệ thống SMM Panel</h1>
    <p class="fs-5 text-success" th:text="${welcomeMessage}"></p>

    <hr class="my-4">
    <p class="text-muted">Trạng thái: Database kết nối thành công. Template hoạt động tốt.</p>

    <div class="mt-4">
        <button class="btn btn-outline-primary mx-2">Đăng nhập</button>
        <button class="btn btn-outline-success mx-2">Đăng ký</button>
    </div>
</div>

</body>
</html>
