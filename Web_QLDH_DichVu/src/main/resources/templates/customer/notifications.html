<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông Báo Của Bạn - SMM Panel</title>

    <style>
        .notif-card { transition: background-color 0.2s; }
        .notif-card:hover { background-color: #f8f9fa; }
        .unread-marker { border-left: 5px solid #0d6efd !important; background-color: #f0f7ff; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{fragments/navbar :: nav-styles}"></th:block>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: customer-nav}"></nav>

<div class="container py-4 pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">

            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center" style="border-radius: 15px 15px 0 0; border-bottom: 2px solid #f8f9fa;">
                    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-bell-fill text-warning me-2"></i>Tất Cả Thông Báo</h4>

                    <form th:if="${unreadNotifCount != null and unreadNotifCount > 0}" th:action="@{/user/notifications/mark-read}" method="post" class="m-0">
                        <button type="submit" class="btn btn-sm btn-outline-primary fw-bold shadow-sm">
                            <i class="bi bi-check2-all me-1"></i> Đánh dấu đã xem
                        </button>
                    </form>
                </div>

                <div class="card-body p-0">
                    <div class="list-group list-group-flush" style="border-radius: 0 0 15px 15px;">

                        <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-3 text-secondary"></i>
                            Bạn chưa có thông báo nào từ hệ thống.
                        </div>

                        <div th:each="n : ${notifications}"
                             class="list-group-item p-4 notif-card d-flex align-items-start"
                             th:classappend="${!n.isRead() ? 'unread-marker' : ''}">

                            <div class="me-4 mt-1">
                                <i th:if="${n.message.contains('💰')}" class="bi bi-cash-coin text-success" style="font-size: 2rem;"></i>
                                <i th:if="${n.message.contains('📦')}" class="bi bi-box-seam text-primary" style="font-size: 2rem;"></i>
                                <i th:if="${n.message.contains('❌')}" class="bi bi-x-circle-fill text-danger" style="font-size: 2rem;"></i>
                                <i th:if="${n.message.contains('🔓')}" class="bi bi-unlock-fill text-info" style="font-size: 2rem;"></i>
                                <i th:if="${!n.message.contains('💰') && !n.message.contains('📦') && !n.message.contains('❌') && !n.message.contains('🔓')}" class="bi bi-megaphone-fill text-secondary" style="font-size: 2rem;"></i>
                            </div>

                            <div class="flex-grow-1">
                                <p class="mb-2 text-dark fs-5" th:classappend="${!n.isRead() ? 'fw-bold' : ''}" th:text="${n.message}">Nội dung thông báo ở đây</p>
                                <small class="text-muted"><i class="bi bi-clock-history me-1"></i><span th:text="${#temporals.format(n.createdAt, 'HH:mm - dd/MM/yyyy')}"></span></small>
                            </div>

                            <div th:if="${!n.isRead()}" class="ms-3 align-self-center">
                                <span class="badge bg-primary rounded-circle p-2 border border-light shadow-sm">
                                    <span class="visually-hidden">Tin mới</span>
                                </span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>


<footer>
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            © COPYRIGHT SMM PANEL - ALL RIGHTS RESERVED.
        </div>
        <div class="d-flex align-items-center">
            <span class="status-dot"></span>
            <span class="me-3 fw-bold" style="color: var(--brand-secondary)">STATE</span>
            <i class="bi bi-globe me-2 fs-5"></i>
            <i class="bi bi-question-circle fs-5"></i>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
