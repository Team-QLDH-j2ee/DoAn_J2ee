<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - SMM Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <th:block th:replace="~{fragments/navbar :: nav-styles}"></th:block>
</head>
<body class="bg-light-purple" style="background-color: #f8f9fe; min-height: 100vh;">

<nav th:replace="~{fragments/navbar :: customer-nav}"></nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0" style="border-radius: 20px;">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-warning text-white rounded-circle mb-3 shadow-sm" style="width: 80px; height: 80px; font-size: 2.5rem;">
                            <i class="bi bi-shield-lock"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Đổi Mật Khẩu</h3>
                        <p class="text-neutral">Vui lòng nhập mật khẩu cũ và mới</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm py-3 text-center" 
                         style="border-radius: 15px; font-weight: 600;">
                        <i class="bi bi-exclamation-circle-fill me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/user/change-password}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold text-neutral small" style="letter-spacing: 1px;">MẬT KHẨU CŨ</label>
                            <input type="password" name="oldPassword" class="form-control form-control-lg rounded-pill px-4 text-dark" placeholder="Nhập mật khẩu hiện tại" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-neutral small" style="letter-spacing: 1px;">MẬT KHẨU MỚI</label>
                            <input type="password" name="newPassword" class="form-control form-control-lg rounded-pill px-4 text-dark" placeholder="Nhập mật khẩu mới" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-neutral small" style="letter-spacing: 1px;">XÁC NHẬN MẬT KHẨU MỚI</label>
                            <input type="password" name="confirmPassword" class="form-control form-control-lg rounded-pill px-4 text-dark" placeholder="Nhập lại mật khẩu mới" required>
                        </div>

                        <div class="d-grid gap-3 mt-5">
                            <button type="submit" class="btn btn-warning btn-lg text-white font-weight-bold shadow-sm" style="font-weight: 600;">Cập nhật mật khẩu</button>
                            <a th:href="@{/user/profile}" class="btn btn-light-gray btn-lg text-decoration-none text-center fw-bold">Hủy bỏ</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            © COPYRIGHT SMM PANEL - ALL RIGHTS RESERVED.
        </div>
        <div class="d-flex align-items-center">
            <span class="status-dot"></span>
            <span class="me-3 fw-bold" style="color: var(--brand-secondary)">STATE</span>
            <i class="bi bi-globe me-2 fs-5"></i>
            <i class="bi bi-question-circle fs-5"></i>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
