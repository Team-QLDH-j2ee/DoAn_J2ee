<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - SMM Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light-purple" style="background-color: #f8f9fe; min-height: 100vh;">

<nav class="navbar navbar-expand-lg bg-white sticky-top py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <span class="text-dark">SMM Panel</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="/">Trang Chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Dịch Vụ</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Giá Cả</a></li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/orders/history}" class="btn btn-custom-outline btn-sm">Dashboard</a>
                <a th:href="@{/profile}" class="d-flex align-items-center text-decoration-none">
                    <i class="bi bi-person-circle text-primary" style="font-size: 1.8rem;"></i>
                    <span class="ms-2 fw-bold text-dark" th:text="${user.username}">Profile</span>
                </a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-danger btn-sm rounded-pill fw-bold" style="background-color: #dc3545; border-color: #dc3545; padding: 6px 16px;">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>



<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0" style="border-radius: 20px;">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-primary-custom text-white rounded-circle mb-3 shadow-sm" style="width: 80px; height: 80px; font-size: 2.5rem;">
                            <i class="bi bi-person"></i>
                        </div>
                        <h3 class="fw-bold mb-0" th:text="${user.fullName != null ? user.fullName : user.username}">Tên người dùng</h3>
                        <p class="text-neutral mt-1" th:text="'@' + ${user.username}">@username</p>
                    </div>

                    <hr style="border-color: #e2e8f0;">

                    <div class="mb-4 mt-4">
                        <label class="text-neutral small fw-bold mb-1" style="letter-spacing: 1px;">ĐỊA CHỈ EMAIL</label>
                        <div class="fs-5 fw-medium text-dark" th:text="${user.email != null ? user.email : 'Chưa cập nhật'}">email@example.com</div>
                    </div>

                    <div class="mb-4">
                        <label class="text-neutral small fw-bold mb-1" style="letter-spacing: 1px;">SỐ DƯ TÀI KHOẢN</label>
                        <div class="fs-2 fw-bold" style="color: var(--brand-secondary);">
                            <span th:text="${#numbers.formatDecimal(user.balance, 0, 'COMMA', 0, 'POINT')}">0</span> đ
                        </div>
                    </div>

                    <div class="row mb-5">
                        <div class="col-6">
                            <label class="text-neutral small fw-bold mb-2" style="letter-spacing: 1px;">VAI TRÒ</label>
                            <div>
                                <span class="badge bg-primary-custom px-3 py-2 rounded-pill" th:if="${user.role.name() == 'ADMIN'}">Quản trị viên</span>
                                <span class="badge bg-secondary px-3 py-2 rounded-pill" th:if="${user.role.name() == 'CUSTOMER'}">Khách hàng</span>
                            </div>
                        </div>
                        <div class="col-6">
                            <label class="text-neutral small fw-bold mb-2" style="letter-spacing: 1px;">TRẠNG THÁI</label>
                            <div>
                                <span class="badge px-3 py-2 rounded-pill" style="background-color: #d1e7dd; color: #0f5132;" th:if="${!user.isLocked}">Hoạt động</span>
                                <span class="badge px-3 py-2 rounded-pill" style="background-color: #f8d7da; color: #842029;" th:if="${user.isLocked}">Bị khóa</span>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-3">
                        <a href="#" class="btn btn-custom-outline btn-lg">Chỉnh sửa thông tin</a>
                        <a href="/recharge" class="btn btn-custom-solid btn-lg" style="background-color: var(--brand-secondary); border-color: var(--brand-secondary);">Nạp thêm tiền</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
