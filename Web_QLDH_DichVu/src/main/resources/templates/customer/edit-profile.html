<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa thông tin - SMM Panel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <head th:replace="~{fragments/navbar :: nav-styles}"></head>
</head>
<body class="bg-light-purple" style="background-color: #f8f9fe; min-height: 100vh;">

<nav th:replace="~{fragments/navbar :: customer-nav}"></nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0" style="border-radius: 20px;">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary-custom">Chỉnh sửa hồ sơ</h3>
                        <p class="text-neutral">Cập nhật thông tin cá nhân của bạn</p>
                    </div>

                    <form th:action="@{/user/update}" method="post" th:object="${user}">

                        <div class="mb-3">
                            <label class="form-label fw-bold text-neutral small" style="letter-spacing: 1px;">TÊN HIỂN THỊ</label>
                            <input type="text" th:field="*{fullName}" class="form-control form-control-lg rounded-pill px-4 text-dark" placeholder="Nhập tên hiển thị của bạn">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-neutral small" style="letter-spacing: 1px;">ĐỊA CHỈ EMAIL</label>
                            <input type="email" th:field="*{email}" class="form-control form-control-lg rounded-pill px-4 text-dark" placeholder="Nhập email liên hệ">
                        </div>

                        <div class="d-grid gap-3 mt-5">
                            <button type="submit" class="btn btn-custom-solid btn-lg">Lưu thay đổi</button>
                            <a th:href="@{/user/profile}" class="btn btn-light-gray btn-lg text-decoration-none text-center fw-bold">Hủy bỏ</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
