<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đặt đơn dịch vụ SMM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">SMM Panel</a>
    <div class="d-flex text-white align-items-center">
      <span class="me-3">Xin chào, <b th:text="${currentUser.username}"></b></span>
      <span class="badge bg-success me-3">Số dư: <span th:text="${currentUser.balance}"></span> VNĐ</span>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
      </form>
    </div>
  </div>
</nav>

<div class="container">
  <div class="card shadow" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Tạo Đơn Dịch Vụ Mới</h4>
    </div>
    <div class="card-body">

      <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

      <form th:action="@{/order/create}" method="post">
        <div class="mb-3">
          <label class="form-label fw-bold">Chọn Dịch Vụ</label>
          <select name="serviceSettingId" class="form-select" required>
            <option value="">-- Vui lòng chọn --</option>
            <option th:each="srv : ${services}"
                    th:value="${srv.id}"
                    th:text="${srv.serviceName + ' - Giá: ' + srv.basePrice + ' VNĐ/lượt'}">
            </option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Link bài viết / Profile</label>
          <input type="url" name="targetLink" class="form-control" placeholder="https://..." required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Số lượng cần tăng</label>
          <input type="number" name="quantity" class="form-control" min="100" placeholder="VD: 1000" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold">TIẾN HÀNH ĐẶT ĐƠN</button>
      </form>

    </div>
  </div>
</div>

</body>
</html>
