<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt đơn dịch vụ SMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-custom { border-radius: 15px; border: none; }
        .btn-order { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); border: none; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">SMM PANEL SYSTEM</a>
        <div class="d-flex text-white align-items-center" th:if="${currentUser}">
            <span class="me-3">Chào, <b th:text="${currentUser.username}"></b></span>
            <span class="badge bg-success me-3 p-2">Số dư: <span id="userBalance" th:text="${#numbers.formatDecimal(currentUser.balance, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="card shadow card-custom" style="max-width: 650px; margin: 0 auto;">
        <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 15px 15px 0 0;">
            <h4 class="mb-0 fw-bold" id="headerTitle">HỆ THỐNG TĂNG TƯƠNG TÁC</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>

            <form th:action="@{/order/create}" method="post" id="orderForm">

                <div class="mb-4">
                    <label class="form-label fw-bold">1. Chọn nền tảng</label>
                    <select id="platformSelect" class="form-select form-select-lg" onchange="filterServices()">
                        <option value="INSTAGRAM" th:selected="${currentPlatform == 'INSTAGRAM'}">Instagram</option>
                        <option value="FACEBOOK" th:selected="${currentPlatform == 'FACEBOOK'}">Facebook</option>
                        <option value="TIKTOK" th:selected="${currentPlatform == 'TIKTOK'}">TikTok</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">2. Chọn loại hình dịch vụ</label>
                    <select name="serviceSettingId" id="serviceSelect" class="form-select form-select-lg" required onchange="calculate()">
                        <option value="" data-price="0">-- Vui lòng chọn dịch vụ --</option>
                        <option th:each="srv : ${services}"
                                th:value="${srv.id}"
                                th:data-price="${srv.basePrice}"
                                th:data-platform="${srv.platform}"
                                th:text="${srv.serviceName}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">3. Link trang cá nhân / Bài viết (URL)</label>
                    <input type="url" name="targetLink" class="form-control"
                           placeholder="Ví dụ: https://www.instagram.com/sondaika/" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">4. Số lượng cần tăng</label>
                    <input type="number" name="quantity" id="quantityInput" class="form-control"
                           min="100" value="100" required oninput="calculate()">
                </div>

                <div class="alert alert-warning mb-4 py-3 border-0 shadow-sm">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted fw-semibold">Đơn giá:</span>
                        <span class="fw-bold"><span id="unitPrice">0</span> VNĐ</span>
                    </div>
                    <div class="d-flex justify-content-between fw-bold text-danger fs-5 border-top border-warning pt-2">
                        <span>TỔNG THANH TOÁN:</span>
                        <span><span id="totalDisplay">0</span> VNĐ</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-order w-100 py-3 fw-bold shadow">
                    TIẾN HÀNH ĐẶT ĐƠN
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    // DOM Elements
    const platformSelect = document.getElementById('platformSelect');
    const serviceSelect = document.getElementById('serviceSelect');
    const headerTitle = document.getElementById('headerTitle');
    const unitPriceDisp = document.getElementById('unitPrice');
    const totalDisplay = document.getElementById('totalDisplay');
    const quantityInput = document.getElementById('quantityInput');

    // Hàm Lọc Dịch Vụ Theo Nền Tảng
    function filterServices() {
      const selectedPlatform = platformSelect.value;

      // Đổi Header title cho ngầu
      headerTitle.innerText = "HỆ THỐNG TĂNG TƯƠNG TÁC " + selectedPlatform;

      // Lặp qua các option của ô dịch vụ để ẩn/hiện
      let hasVisibleOption = false;
      for (let i = 1; i < serviceSelect.options.length; i++) { // Bỏ qua option đầu tiên (Vui lòng chọn...)
        const option = serviceSelect.options[i];
        if (option.getAttribute('data-platform') === selectedPlatform) {
          option.hidden = false;
          option.disabled = false;
          hasVisibleOption = true;
        } else {
          option.hidden = true;
          option.disabled = true;
        }
      }

      // Reset lại ô chọn dịch vụ và tính tiền
      serviceSelect.value = "";
      calculate();
    }

    // Hàm Tính Tiền
    function calculate() {
      const selectedOption = serviceSelect.options[serviceSelect.selectedIndex];
      // Nếu chưa chọn dịch vụ thì giá = 0
      const price = selectedOption && selectedOption.value !== "" ? (parseFloat(selectedOption.getAttribute('data-price')) || 0) : 0;
      const qty = parseInt(quantityInput.value) || 0;

      unitPriceDisp.innerText = price.toLocaleString('vi-VN');
      totalDisplay.innerText = (price * qty).toLocaleString('vi-VN');
    }

    // Khởi chạy khi load trang
    document.addEventListener('DOMContentLoaded', () => {
      filterServices(); // Tự động lọc dựa theo platform mặc định khi mới vào
    });
</script>

</body>
</html>
