<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Đơn Hàng - SMM Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .card-custom { border-radius: 15px; border: none; }
    </style>
    <th:block th:replace="~{fragments/navbar :: nav-styles}"></th:block>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: customer-nav}"></nav>

<div class="container pb-5">
    <div class="card shadow card-custom">
        <div class="card-header bg-primary text-white py-3" style="border-radius: 15px 15px 0 0;">
            <h5 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2"></i>Lịch Sử Đơn Hàng Của Bạn</h5>
        </div>
        <div class="card-body p-0">

            <div class="p-3">
                <div th:if="${successMessage}" class="alert alert-success border-0 shadow-sm" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger border-0 shadow-sm" th:text="${errorMessage}"></div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Mã Đơn</th>
                        <th>Link Tương Tác</th>
                        <th>Số Lượng</th>
                        <th>Tổng Tiền</th>
                        <th>Trạng Thái</th>
                        <th class="text-end pe-4">Thao Tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="6" class="text-center py-4 text-muted">Bạn chưa có đơn hàng nào.</td>
                    </tr>
                    <tr th:each="order : ${orders}">
                        <td class="ps-4 fw-bold text-muted" th:text="'#' + ${order.id}"></td>
                        <td><a th:href="${order.targetLink}" target="_blank" class="text-truncate d-inline-block" style="max-width: 200px;" th:text="${order.targetLink}"></a></td>
                        <td th:text="${order.quantity}"></td>
                        <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(order.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                        <td>
                            <span th:if="${order.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Chờ Thanh Toán</span>
                            <span th:if="${order.status.name() == 'IN_PROGRESS'}" class="badge bg-info text-dark">Đang Chạy</span>
                            <span th:if="${order.status.name() == 'COMPLETED'}" class="badge bg-success">Hoàn Thành</span>
                            <span th:if="${order.status.name() == 'CANCELLED'}" class="badge bg-secondary">Đã Hủy</span>
                        </td>

                        <td class="text-end pe-4 text-nowrap">
                            <div th:if="${order.status.name() == 'PENDING'}">

                                <form th:action="@{/order/pay/{id}(id=${order.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-success shadow-sm" title="Thanh Toán">
                                        <i class="bi bi-wallet2"></i>
                                    </button>
                                </form>

                                <button type="button" class="btn btn-sm btn-primary shadow-sm mx-1" data-bs-toggle="modal" th:data-bs-target="'#editOrderModal' + ${order.id}" title="Sửa Đơn">
                                    <i class="bi bi-pencil-square"></i>
                                </button>

                                <form th:action="@{/order/cancel/{id}(id=${order.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Bạn có chắc chắn muốn hủy đơn hàng này không?');">
                                    <button type="submit" class="btn btn-sm btn-danger shadow-sm" title="Hủy Đơn">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </form>

                                <div class="modal fade" th:id="'editOrderModal' + ${order.id}" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content text-start border-0 shadow">
                                            <form th:action="@{/order/edit/{id}(id=${order.id})}" method="post">
                                                <div class="modal-header bg-primary text-white">
                                                    <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Sửa Đơn Hàng #<span th:text="${order.id}"></span></h5>
                                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                                </div>
                                                <div class="modal-body p-4">
                                                    <div class="alert alert-info py-2">
                                                        Hệ thống sẽ tự động tính lại tổng tiền dựa trên số lượng mới.
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label fw-bold">Link Tương Tác Mới</label>
                                                        <input type="url" name="targetLink" class="form-control" th:value="${order.targetLink}" required>
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label fw-bold">Số Lượng Cần Tăng</label>
                                                        <input type="number" name="quantity" class="form-control" th:value="${order.quantity}" min="100" required>
                                                    </div>
                                                </div>
                                                <div class="modal-footer bg-light">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                                                    <button type="submit" class="btn btn-primary fw-bold">Lưu Thay Đổi</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <span th:if="${order.status.name() != 'PENDING'}" class="text-muted fst-italic"><i class="bi bi-lock-fill"></i> Đã khóa</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4 mb-3">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 1 ? 'disabled' : ''}">
                        <a class="page-link shadow-sm" th:href="@{/order/history(page=${currentPage - 1})}"><i class="bi bi-chevron-left"></i> Trước</a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i ? 'active' : ''}">
                        <a class="page-link shadow-sm" th:href="@{/order/history(page=${i})}" th:text="${i}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages ? 'disabled' : ''}">
                        <a class="page-link shadow-sm" th:href="@{/order/history(page=${currentPage + 1})}">Sau <i class="bi bi-chevron-right"></i></a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
